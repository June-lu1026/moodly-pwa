<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#8a63ff" />
  <title>Moodly AI</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="assets/icon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <section class="phone" aria-label="Moodly AI demo">
      <div class="statusbar"><strong>9:41</strong><div class="status-icons"><span class="signal">▮▮▮▮</span><span>⌁</span><span class="battery"></span></div></div>
      <div id="app" class="app"></div>
      <nav id="bottomNav" class="bottom-nav" aria-label="Primary navigation"></nav>
    </section>
  </main>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
    }
  </script>
</body>
</html>
