<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <meta name="theme-color" content="#faf9ff" />
  <title>Moodly AI — Competition Edition</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="stage">
    <section class="phone" aria-label="Moodly Today screen">
      <div class="statusbar" aria-hidden="true">
        <strong>9:41</strong>
        <div class="status-icons">
          <svg viewBox="0 0 24 16"><rect x="1" y="10" width="3" height="5" rx="1"/><rect x="6" y="7" width="3" height="8" rx="1"/><rect x="11" y="4" width="3" height="11" rx="1"/><rect x="16" y="1" width="3" height="14" rx="1"/></svg>
          <svg class="wifi" viewBox="0 0 24 16"><path d="M2 5.5C7.4.7 16.6.7 22 5.5M6 9c3.3-2.9 8.7-2.9 12 0M10 12.3c1.1-1 2.9-1 4 0"/></svg>
          <svg class="battery" viewBox="0 0 31 16"><rect x="1" y="2" width="25" height="12" rx="3"/><rect x="27" y="6" width="3" height="4" rx="1"/><rect x="4" y="5" width="18" height="6" rx="1.5"/></svg>
        </div>
      </div>

      <div class="corner-glow" aria-hidden="true"></div>

      <div class="content">
        <header class="topbar">
          <img class="brand-logo" src="assets/logo.png" alt="Moodly" />
          <button class="icon-button" id="calendarButton" aria-label="Open calendar">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 3v3M17 3v3M4.5 8.5h15M6.5 5h11A2.5 2.5 0 0 1 20 7.5v10A2.5 2.5 0 0 1 17.5 20h-11A2.5 2.5 0 0 1 4 17.5v-10A2.5 2.5 0 0 1 6.5 5Z"/></svg>
          </button>
        </header>

        <section class="hero">
          <h1>Today</h1>
          <p>How are you feeling?</p>
        </section>

        <section class="mood-row" aria-label="Choose your mood">
          <button class="mood-card" data-mood="Great" aria-pressed="false">
            <span class="mood-face mint"><svg viewBox="0 0 64 64"><circle cx="23" cy="27" r="3"/><circle cx="41" cy="27" r="3"/><path d="M19 36c3 8 23 8 26 0"/></svg></span><strong>Great</strong>
          </button>
          <button class="mood-card" data-mood="Good" aria-pressed="false">
            <span class="mood-face blue"><svg viewBox="0 0 64 64"><circle cx="23" cy="27" r="3"/><circle cx="41" cy="27" r="3"/><path d="M21 37c4 6 18 6 22 0"/></svg></span><strong>Good</strong>
          </button>
          <button class="mood-card selected" data-mood="Okay" aria-pressed="true">
            <span class="mood-face yellow"><svg viewBox="0 0 64 64"><circle cx="23" cy="27" r="3"/><circle cx="41" cy="27" r="3"/><path d="M23 39h18"/></svg></span><strong>Okay</strong>
          </button>
          <button class="mood-card" data-mood="Low" aria-pressed="false">
            <span class="mood-face orange"><svg viewBox="0 0 64 64"><circle cx="23" cy="27" r="3"/><circle cx="41" cy="27" r="3"/><path d="M21 43c4-7 18-7 22 0"/></svg></span><strong>Low</strong>
          </button>
          <button class="mood-card" data-mood="Awful" aria-pressed="false">
            <span class="mood-face pink"><svg viewBox="0 0 64 64"><circle cx="23" cy="27" r="3"/><circle cx="41" cy="27" r="3"/><path d="M20 43c4-9 20-9 24 0"/><path d="M18 48c2 3 2 5 0 7M46 48c-2 3-2 5 0 7" class="tears"/></svg></span><strong>Awful</strong>
          </button>
        </section>

        <section class="note-section">
          <label for="noteInput">Add a quick note <span>(optional)</span></label>
          <div class="note-box">
            <textarea id="noteInput" maxlength="80" placeholder="What's on your mind?"></textarea>
            <small><span id="count">0</span>/80</small>
          </div>
          <button class="checkin" id="checkinButton">Check In <span>✦</span></button>
        </section>

        <button class="encouragement" id="reflectionCard">
          <div class="encouragement-copy"><small>Daily encouragement</small><p>Small steps today,<br />big changes tomorrow.</p></div>
          <div class="character" aria-hidden="true"><i class="shine"></i><i class="eye left"></i><i class="eye right"></i><i class="smile"></i><b>♥</b></div>
        </button>
      </div>

      <nav class="tabbar" aria-label="Main navigation">
        <button class="active" data-screen="today"><svg viewBox="0 0 24 24"><path d="m3 11 9-8 9 8v9H5v-9"/></svg><span>Today</span></button>
        <button data-screen="calendar"><svg viewBox="0 0 24 24"><path d="M7 3v3M17 3v3M4 8h16M5 5h14v15H5z"/></svg><span>Calendar</span></button>
        <button data-screen="insights"><svg viewBox="0 0 24 24"><path d="M5 20V10M12 20V4M19 20v-7"/></svg><span>Insights</span></button>
        <button data-screen="chat"><svg viewBox="0 0 24 24"><path d="M5 18 3 21v-5a8 8 0 1 1 3 3"/></svg><span>Chat</span></button>
        <button data-screen="settings"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.4-2.4 1A7 7 0 0 0 15 6l-.4-2.6h-4L10 6a7 7 0 0 0-1.5.9l-2.4-1-2 3.4L6.2 11a7 7 0 0 0 0 2l-2 1.5 2 3.4 2.4-1A7 7 0 0 0 10 18l.4 2.6h4L15 18a7 7 0 0 0 1.5-.9l2.4 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2Z"/></svg><span>Settings</span></button>
      </nav>

      <div class="toast" id="toast" role="status" aria-live="polite">Check-in saved</div>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
